<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Notebook Checker</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">SmartCheck</div>
            <button class="lang-toggle" id="langBtn">EN / हिंदी</button>
        </header>

        <section class="hero" id="heroSection">
            <h1 data-en="Check Notebooks in Seconds" data-hi="सेकंडों में नोटबुक चेक करें">Check Notebooks in Seconds</h1>
            <p data-en="Snap a photo of the math page and let AI do the rest." data-hi="गणित के पेज का फोटो लें और AI को बाकी काम करने दें।">Snap a photo of the math page and let AI do the rest.</p>
        </section>

        <div class="card" id="scanCard">
            <div class="upload-area" id="dropZone">
                <i class="fa-solid fa-camera-retro" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;"></i>
                <p data-en="Click to Open Camera or Upload" data-hi="कैमरा खोलने या अपलोड करने के लिए क्लिक करें">Click to Open Camera or Upload</p>
                <input type="file" id="fileInput" accept="image/*" capture="environment" hidden>
            </div>
        </div>

        <div class="card" id="processingCard" style="display: none;">
            <div style="text-align: center;">
                <div class="spinner" style="margin-bottom: 1rem;">
                    <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--primary);"></i>
                </div>
                <p data-en="Analyzing with AI..." data-hi="AI के साथ विश्लेषण किया जा रहा है...">Analyzing with AI...</p>
            </div>
        </div>

        <div id="resultsArea" style="display: none;">
            <h2 style="margin-bottom: 1rem;" data-en="Scan Results" data-hi="स्कैन के परिणाम">Scan Results</h2>
            <div class="results-list" id="resultsList">
                <!-- Results will be injected here -->
            </div>
            <button class="btn" style="margin-top: 2rem;" onclick="location.reload()" data-en="Scan New Page" data-hi="नया पेज स्कैन करें">Scan New Page</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
